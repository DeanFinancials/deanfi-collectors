# GSC topics collector configuration
#
# site_url: Google Search Console property identifier (domain property format)
# window_days: days of Search Analytics history to pull
# max_topics: cap on GSC-derived topics carried into output
# min_impressions: minimum impressions to include a query (filters noise)
# excluded_page_prefixes: path prefixes already served → excluded before ranking
# seed_topics: manually curated evergreen entries merged after GSC-derived topics.
#              GSC entry wins on slug collision. These are the steady-state content
#              backbone: the weekend run always has solid, groundable topics even
#              when GSC signal is thin or noisy. load_seed_topics() stamps
#              source="wes", status="suggested", gsc_evidence=null, and a fresh
#              added_at on every run, so only the content fields are needed below.
#
#   Field guide (per seed):
#     slug                  kebab-case; becomes the article slug + dedup key
#     title_working         working title (the renderer owns the final H1)
#     category              one of: market-education | retirement | debt | financial-tips
#     vertical              optional tool vertical hint (null = none)
#     target_keyword        primary SEO phrase the article targets
#     secondary_keywords    supporting phrases
#     internal_link_targets real promotable routes the article can link (must exist
#                           under src/pages/**; the website allowlist is authoritative)
#     facts_refs            real fact ids from education/facts.json to ground figures
#
#   Selection note: seeds carry no GSC score, so the website selector rotates them
#   in via the staleness backstop (category by category) and, within a category, in
#   the order listed here — so put the strongest topic first in each block. As each
#   publishes, its slug dedups out and the next one is picked.

site_url: "sc-domain:deanfi.com"
window_days: 90
max_topics: 50
min_impressions: 5
excluded_page_prefixes:
  - "/insights/"

seed_topics:
