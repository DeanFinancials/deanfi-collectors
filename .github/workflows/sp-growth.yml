name: S&P Growth Collection

on:
  schedule:
    # Weeknights at 11:15pm Eastern (04:15 UTC Tue-Sat) - 15 minutes after analyst-trends/earnings
    # GitHub Actions cron uses UTC; 04:15 UTC maps to:
    #   • 11:15pm EST (standard time roughly Nov–Mar)
    #   • 12:15am EDT (daylight saving time roughly Mar–Nov)
    # This ensures we run after the 04:00 UTC jobs (analyst-trends, earnings) with a 15-minute buffer
    - cron: '15 4 * * 2-6'
  workflow_dispatch:
    inputs:
      universe:
        description: 'Which universe to process'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - sp100-only
          - sp500-only

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FINNHUB_API_KEY: "${{ secrets.FINNHUB_API_KEY }}"
  DATA_REPO: "${{ github.repository_owner }}/deanfi-data"
  DATA_REPO_TOKEN: "${{ secrets.DATA_REPO_TOKEN }}"

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Queue all data collectors to prevent git conflicts when writing to deanfi-data repo
    concurrency:
      group: deanfi-data-repo
      queue: max
      cancel-in-progress: false
    
    steps:
      - name: Checkout collectors repo
        uses: actions/checkout@v5
      
      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data-cache
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Fetch S&P growth metrics
        continue-on-error: true
        run: |
          cd spgrowth
          
          # Determine which universe(s) to process based on workflow input
          UNIVERSE_FLAG=""
          if [ "${{ github.event.inputs.universe }}" = "sp100-only" ]; then
            UNIVERSE_FLAG="--sp100-only"
          elif [ "${{ github.event.inputs.universe }}" = "sp500-only" ]; then
            UNIVERSE_FLAG="--sp500-only"
          fi
          
          python fetch_sp_growth.py $UNIVERSE_FLAG
          echo "✅ S&P growth metrics fetched"
      
      - name: Copy to data repo
        run: |
          mkdir -p data-cache/sp100growth
          mkdir -p data-cache/sp500growth

          if [ -f spgrowth/output/sp100growth.json ]; then
            cp spgrowth/output/sp100growth.json data-cache/sp100growth/ || true
            echo "✅ SP100 growth file copied"
          fi

          if [ -f spgrowth/output/sp500growth.json ]; then
            cp spgrowth/output/sp500growth.json data-cache/sp500growth/ || true
            echo "✅ SP500 growth file copied"
          fi

      - name: Update data freshness
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          fp = Path('data-cache/data_freshness.json')
          data = json.loads(fp.read_text()) if fp.exists() else {"sections": {}}

          section_sentinels = {
              "sp100growth": "spgrowth/output/sp100growth.json",
              "sp500growth": "spgrowth/output/sp500growth.json",
          }
          for section, sentinel in section_sentinels.items():
              if Path(sentinel).exists():
                  data["sections"][section] = {"last_updated": now}
                  print(f"  ✅ {section}: {now}")
              else:
                  existing = data.get("sections", {}).get(section, {}).get("last_updated", "never")
                  print(f"  ⏭  {section}: no output, keeping {existing}")

          fp.write_text(json.dumps(data, indent=2))
          print("✅ data_freshness.json written")
          EOF

      - name: Commit and push
        run: |
          cd data-cache
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add sp100growth/ sp500growth/ data_freshness.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update S&P growth metrics - $(date -u +"%Y-%m-%d")"
            git pull --rebase origin main
            git push
            echo "✅ Data pushed to repository"
          fi
