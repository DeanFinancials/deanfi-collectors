name: Market Data Collection (10-min)

on:
  schedule:
    - cron: '5-55/10 12-21 * * 1-5'  # 8am-5pm ET year-round (market-hours guard handles DST)
  workflow_dispatch:

env:
  DATA_REPO: "${{ github.repository_owner }}/deanfi-data"
  DATA_REPO_TOKEN: "${{ secrets.DATA_REPO_TOKEN }}"

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Queue all data collectors to prevent git conflicts when writing to deanfi-data repo
    concurrency:
      group: deanfi-data-repo
      cancel-in-progress: false
    
    steps:
      - name: Checkout collectors repo
        uses: actions/checkout@v4
      
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data-cache
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get date for cache key
        id: cache_date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: ./cache
          key: market-data-cache-${{ steps.cache_date.outputs.date }}
          restore-keys: |
            market-data-cache-

      - name: Check market hours
        id: hours_check
        run: |
          python3 << 'EOF'
          from datetime import datetime
          import zoneinfo, os
          et = datetime.now(zoneinfo.ZoneInfo('America/New_York'))
          in_hours = 8 <= et.hour < 17
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'in_market_hours={str(in_hours).lower()}\n')
          status = "OPEN" if in_hours else "CLOSED"
          print(f"Market {status} — ET time: {et.strftime('%H:%M %Z')}")
          EOF

      - name: Create cache directory
        run: mkdir -p ./cache
      
      # ==================== MARKET BREADTH ====================
      - name: Fetch daily breadth
        continue-on-error: true
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          cd advancedecline
          python fetch_daily_breadth.py --cache-dir ../cache
          echo "✅ Daily breadth fetched"

      - name: Fetch A/D line historical
        continue-on-error: true
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          cd advancedecline
          python fetch_ad_line_historical.py --cache-dir ../cache
          echo "✅ A/D line historical fetched"

      - name: Fetch MA percentage historical
        continue-on-error: true
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          cd advancedecline
          python fetch_ma_percentage_historical.py --cache-dir ../cache
          echo "✅ MA percentage historical fetched"

      - name: Fetch highs/lows historical
        continue-on-error: true
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          cd advancedecline
          python fetch_highs_lows_historical.py --cache-dir ../cache
          echo "✅ Highs/lows historical fetched"

      - name: Fetch volume metrics historical
        continue-on-error: true
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          cd advancedecline
          python fetch_volume_metrics_historical.py --cache-dir ../cache --sessions 60
          echo "✅ Volume metrics historical fetched"

      # ==================== MAJOR INDEXES ====================
      - name: Fetch all index data
        continue-on-error: true
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          cd majorindexes
          python fetch_us_major.py --cache-dir ../cache
          python fetch_sectors.py --cache-dir ../cache
          python fetch_growth_value.py --cache-dir ../cache
          python fetch_international.py --cache-dir ../cache
          python fetch_bonds.py --cache-dir ../cache
          python fetch_commodities.py --cache-dir ../cache
          echo "✅ All index data fetched"

      # ==================== MEAN REVERSION ====================
      - name: Fetch Price vs MA data
        continue-on-error: true
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          cd meanreversion
          python fetch_price_vs_ma.py --cache-dir ../cache
          echo "✅ Price vs MA data fetched"

      - name: Fetch MA Spreads data
        continue-on-error: true
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          cd meanreversion
          python fetch_ma_spreads.py --cache-dir ../cache
          echo "✅ MA spreads data fetched"

      # ==================== IMPLIED VOLATILITY ====================
      - name: Fetch implied volatility data
        continue-on-error: true
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          cd impliedvol
          python fetch_vix_options.py || echo "VIX fetch failed, continuing..."
          python fetch_major_indices_iv.py || echo "Major indices IV fetch failed, continuing..."
          python fetch_sector_etfs_iv.py || echo "Sector ETFs IV fetch failed, continuing..."
          echo "✅ Implied volatility data fetched"
      
      # ==================== COPY TO DATA REPO ====================
      - name: Copy all files to data repo
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          mkdir -p data-cache/advance-decline
          cp advancedecline/daily_breadth.json data-cache/advance-decline/ 2>/dev/null || true
          cp advancedecline/ad_line_historical.json data-cache/advance-decline/ 2>/dev/null || true
          cp advancedecline/ma_percentage_historical.json data-cache/advance-decline/ 2>/dev/null || true
          cp advancedecline/highs_lows_historical.json data-cache/advance-decline/ 2>/dev/null || true
          cp advancedecline/volume_metrics_historical.json data-cache/advance-decline/ 2>/dev/null || true

          mkdir -p data-cache/major-indexes
          cp majorindexes/*.json data-cache/major-indexes/ 2>/dev/null || true

          mkdir -p data-cache/meanreversion
          cp meanreversion/*.json data-cache/meanreversion/ 2>/dev/null || true

          mkdir -p data-cache/implied-volatility
          cp impliedvol/*.json data-cache/implied-volatility/ 2>/dev/null || true

          echo "✅ Files copied (missing outputs skipped)"
      
      # ==================== DATA FRESHNESS ====================
      - name: Update data freshness
        if: steps.hours_check.outputs.in_market_hours == 'true'
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          fp = Path('data-cache/data_freshness.json')
          data = json.loads(fp.read_text()) if fp.exists() else {"sections": {}}

          section_sentinels = {
              "advance-decline":    "advancedecline/daily_breadth.json",
              "major-indexes":      "majorindexes/us_major_indices.json",
              "meanreversion":      "meanreversion/price_vs_ma_snapshot.json",
              "implied-volatility": "impliedvol/vix_options_snapshot.json",
          }
          for section, sentinel in section_sentinels.items():
              if Path(sentinel).exists():
                  data["sections"][section] = {"last_updated": now}
                  print(f"  ✅ {section}: {now}")
              else:
                  existing = data.get("sections", {}).get(section, {}).get("last_updated", "never")
                  print(f"  ⏭  {section}: no output, keeping {existing}")

          fp.write_text(json.dumps(data, indent=2))
          print("✅ data_freshness.json written")
          EOF

      # ==================== COMMIT AND PUSH ====================
      - name: Commit and push
        run: |
          cd data-cache
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add advance-decline/ major-indexes/ meanreversion/ implied-volatility/ data_freshness.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update market data (10-min) - $(date -u +"%Y-%m-%d %H:%M UTC")"
            git pull --rebase origin main
            git push
            echo "✅ Market data pushed to repository"
          fi
