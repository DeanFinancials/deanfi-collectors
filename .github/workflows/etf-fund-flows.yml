name: ETF Fund Flows (Daily)

on:
  schedule:
  # Weeknights after US market close.
  # 4:45pm EST = 21:45 UTC (Mon-Fri)
  - cron: '45 21 * * 1-5'
  # EDT variant (uncomment during daylight saving time)
  # - cron: '45 20 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'test'
        type: choice
        options:
          - test
          - full
      tickers:
        description: 'Comma-separated tickers (optional override)'
        required: false
        default: 'SPY,VOO,XLV,XLE,TLT'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ALPHA_VANTAGE_API_KEY: "${{ secrets.ALPHA_VANTAGE_API_KEY }}"
  DATA_REPO: "${{ github.repository_owner }}/deanfi-data"
  DATA_REPO_TOKEN: "${{ secrets.DATA_REPO_TOKEN }}"

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: deanfi-data-repo
      cancel-in-progress: false

    steps:
      - name: Checkout collectors repo
        uses: actions/checkout@v5

      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data-cache

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate ETF fund flows
        continue-on-error: true
        run: |
          cd etffundflows

          # Manual runs default to test mode unless set to full
          MODE="${{ github.event.inputs.mode }}"
          TICKERS="${{ github.event.inputs.tickers }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled run: full universe"
            python fetch_etf_fund_flows.py --config ./config.yml
          else
            if [ "$MODE" = "full" ]; then
              echo "Manual full run"
              python fetch_etf_fund_flows.py --config ./config.yml
            else
              echo "Manual test run: tickers=$TICKERS"
              python fetch_etf_fund_flows.py --config ./config.yml --tickers "$TICKERS"
            fi
          fi

      - name: Copy to data repo
        run: |
          mkdir -p data-cache/etf-fund-flows
          cp etffundflows/output/*.json data-cache/etf-fund-flows/ 2>/dev/null || true
          echo "✅ ETF fund flows files copied (missing outputs skipped)"

      - name: Update data freshness
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          fp = Path('data-cache/data_freshness.json')
          data = json.loads(fp.read_text()) if fp.exists() else {"sections": {}}

          has_output = any(Path('etffundflows/output').glob('*.json')) if Path('etffundflows/output').exists() else False
          if has_output:
              data["sections"]["etf-fund-flows"] = {"last_updated": now}
              print(f"  ✅ etf-fund-flows: {now}")
          else:
              existing = data.get("sections", {}).get("etf-fund-flows", {}).get("last_updated", "never")
              print(f"  ⏭  etf-fund-flows: no output, keeping {existing}")

          fp.write_text(json.dumps(data, indent=2))
          print("✅ data_freshness.json written")
          EOF

      - name: Commit and push
        run: |
          cd data-cache
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add etf-fund-flows/ data_freshness.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ETF fund flows - $(date -u +"%Y-%m-%d")"
            git pull --rebase origin main
            git push
            echo "✅ ETF fund flows pushed to repository"
          fi
