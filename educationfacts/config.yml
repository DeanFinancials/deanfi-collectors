# education-facts collector configuration
#
# A9 category → source mapping (confirms assumption A9 is satisfied):
#   market-education : FRED (fed funds, Treasury DGS10/DGS2), BLS (unemployment, CPI)
#   retirement       : IRS seeds (401k/IRA limits), SSA seeds (COLA/FRA/earnings limits)
#   debt             : FRED (30yr mortgage MORTGAGE30US, delinquency DRSFRMACBS,
#                           national rates SAVRNJ/CD1NRNJ, HPI USSTHPI)
#                      Treasury fiscaldata (avg Treasury Notes/Bonds rate)
#   financial-tips   : IRS seeds (standard deduction, HSA limits), FSA seeds (loan rates)
#   cross-cutting    : BLS (avg hourly earnings), BEA (GDP growth)
#
# Sane bounds: [min_inclusive, max_inclusive] per fact id.
# A numeric value outside these bounds causes the record to be rejected and logged.
# Seed facts in a non-numeric unit (e.g. "text") have no numeric bounds entry.
sane_bounds:
  # IRS contribution / deduction limits (USD) ─ 2026
  irs-401k-employee-limit-2026:     [10000,  100000]
  irs-ira-contribution-limit-2026:  [1000,    50000]
  irs-std-deduction-single-2026:    [5000,    50000]
  irs-std-deduction-mfj-2026:       [10000,  100000]
  irs-hsa-individual-limit-2026:    [1000,    20000]
  irs-hsa-family-limit-2026:        [2000,    30000]
  # SSA benefit parameters ─ 2026
  ssa-cola-pct-2026:                [-2.0,     15.0]
  ssa-earnings-test-under-fra-2026: [5000,   200000]
  # FSA federal loan rates 2025-26 (%)
  fsa-direct-subsidized-rate-2025-26:          [1.0, 15.0]
  fsa-direct-unsubsidized-undergrad-rate-2025-26: [1.0, 15.0]
  fsa-direct-unsubsidized-grad-rate-2025-26:   [1.0, 20.0]
  fsa-direct-plus-rate-2025-26:                [1.0, 25.0]
  # FHFA conforming loan limit 2026 (USD)
  fhfa-conforming-loan-limit-2026:  [100000, 5000000]
  # FRED series bounds (live-fetched, Group 2)
  fred-fed-funds-rate:              [0.0,    25.0]
  fred-10yr-treasury-yield:         [0.1,    20.0]
  fred-2yr-treasury-yield:          [0.0,    20.0]
  fred-30yr-mortgage-pmms:          [2.0,    20.0]
  # fred-national-savings-rate and fred-national-cd-12mo-rate removed (FRED series
  # SAVRNJ / CD1NRNJ discontinued 2021; direct FDIC API integration deferred to v2)
  fred-mortgage-delinquency:        [0.0,    30.0]
  fred-hpi-all-transactions:        [50.0, 1000.0]
  # BLS series bounds (live-fetched, Group 2)
  bls-unemployment-rate:            [0.5,    30.0]
  bls-cpi-all-urban-index:          [50.0, 1000.0]
  # Treasury fiscaldata bounds (live-fetched, Group 1)
  treasury-notes-avg-rate:          [0.1,    20.0]
  treasury-bonds-avg-rate:          [0.1,    20.0]
  # BEA GDP growth (%, annualized, Group 2 optional)
  bea-gdp-growth-pct:               [-30.0,  30.0]

# Seed facts — static / annual figures maintained by Wes.
# Update as_of and value each time IRS/SSA/FSA publishes new-year limits.
# max_age_days: 400 for annual figures (allows a full year + grace period).
# VERIFY these values annually before the new tax year begins.
seed_facts:
  # ── IRS 2026 ──────────────────────────────────────────────────────────────
  - id: irs-401k-employee-limit-2026
    category: retirement
    claim: "2026 401(k) employee elective deferral limit"
    value: 24500
    unit: "USD"
    source_name: "IRS Rev. Proc. 2025-xx / IRS Newsroom"
    source_url: "https://www.irs.gov/newsroom/401k-limit-increases-to-24500-for-2026"
    as_of: "2025-11-01"
    max_age_days: 400
    tax_year: 2026

  - id: irs-ira-contribution-limit-2026
    category: retirement
    claim: "2026 IRA contribution limit (traditional and Roth; includes $1,000 catch-up for age 50+)"
    value: 7500
    unit: "USD"
    source_name: "IRS Rev. Proc. 2025-xx / IRS Newsroom"
    source_url: "https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-ira-contribution-limits"
    as_of: "2025-11-01"
    max_age_days: 400
    tax_year: 2026

  - id: irs-std-deduction-single-2026
    category: financial-tips
    claim: "2026 standard deduction for single filers"
    value: 15750
    unit: "USD"
    source_name: "IRS Rev. Proc. 2025-xx"
    source_url: "https://www.irs.gov/newsroom/irs-releases-tax-inflation-adjustments-for-tax-year-2026"
    as_of: "2025-11-01"
    max_age_days: 400
